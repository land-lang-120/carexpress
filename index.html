<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>CarExpress — Covoiturage Cameroun</title>
  <meta name="description" content="Trouvez ou proposez un trajet de covoiturage au Cameroun. Yaoundé, Douala, Bafoussam et plus."/>
  <meta name="theme-color" content="#1F2937"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'><rect width='30' height='30' rx='9' fill='%231F2937'/><path d='M7 20h16M9 17l3-9h6l3 9' stroke='%2325D366' stroke-width='1.8' stroke-linecap='round' fill='none'/><circle cx='11' cy='21' r='2' fill='%2325D366'/><circle cx='19' cy='21' r='2' fill='%2325D366'/></svg>"/>
  <link rel="apple-touch-icon" href="icons/icon-192.svg"/>

  <!-- Global CSS -->
  <link rel="stylesheet" href="css/global.css"/>

  <style>
    html, body { height: 100%; background: #DCDFE4; }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="ce-loading">
    <div class="loading-logo">
      <svg width="80" height="80" viewBox="0 0 120 120" fill="none">
        <rect width="120" height="120" rx="34" fill="#1F2937"/>
        <path d="M30 80h60M36 68l8-24h32l8 24" stroke="#25D366" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="45" cy="81" r="7" fill="#25D366"/><circle cx="75" cy="81" r="7" fill="#25D366"/>
        <path d="M60 32v11" stroke="#25D366" stroke-width="3.5" stroke-linecap="round"/>
        <circle cx="60" cy="28" r="5" fill="#25D366"/>
      </svg>
    </div>
    <p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:#9CA3AF;font-weight:500;">
      Chargement en cours...
    </p>
    <div class="loading-bar-track">
      <div class="loading-bar-fill"></div>
    </div>
  </div>

  <!-- React root -->
  <div id="root"></div>

  <!-- React 18 + Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- App Bundle -->
  <script type="text/babel" data-presets="react" src="bundle.js?v=3"></script>

  <!-- Hide loading screen after React mounts -->
  <script>
    (function checkReady() {
      var root = document.getElementById('root');
      var loader = document.getElementById('ce-loading');
      if (root && root.innerHTML.length > 10 && loader) {
        loader.classList.add('fade-out');
        setTimeout(function() { loader.remove(); }, 400);
      } else {
        setTimeout(checkReady, 200);
      }
    })();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function() {});
    }
  </script>
</body>
</html>
