<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>CarExpress — Covoiturage Cameroun</title>
  <meta name="description" content="Trouvez ou proposez un trajet de covoiturage au Cameroun. Yaoundé, Douala, Bafoussam et plus."/>
  <meta name="theme-color" content="#1F2937"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231F2937'/><path d='M7 24C12 19 18 15 26 11' stroke='rgba(255,255,255,0.06)' stroke-width='4' stroke-linecap='round' fill='none'/><path d='M7 24C12 19 18 15 26 11' stroke='%2325D366' stroke-width='0.6' stroke-linecap='round' fill='none' stroke-dasharray='2 2'/><rect x='6' y='16' width='16' height='4' rx='1.2' fill='%2325D366'/><path d='M10 16l2-5h6l2 5' fill='%2325D366'/><path d='M12.5 11.5l-1.5 4h4z' fill='%231F2937' opacity='.5'/><rect x='16' y='11.5' width='4' height='3.8' fill='%231F2937' opacity='.5'/><circle cx='21' cy='17.5' r='.7' fill='%23FBBF24'/><circle cx='10' cy='20.5' r='2.2' fill='%23111827'/><circle cx='10' cy='20.5' r='1.2' fill='%23374151'/><circle cx='18' cy='20.5' r='2.2' fill='%23111827'/><circle cx='18' cy='20.5' r='1.2' fill='%23374151'/><circle cx='26' cy='10' r='2' fill='%2325D366' opacity='.3'/><circle cx='26' cy='10' r='1.2' fill='%2325D366'/></svg>"/>
  <link rel="apple-touch-icon" href="icons/icon-192.svg"/>

  <!-- Global CSS -->
  <link rel="stylesheet" href="css/global.css"/>

  <style>
    html, body { height: 100%; background: #DCDFE4; }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="ce-loading">
    <div class="loading-logo">
      <svg width="80" height="80" viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="8" fill="#1F2937"/>
        <path d="M7 24 C 12 19 18 15 26 11" stroke="rgba(255,255,255,0.06)" stroke-width="4" stroke-linecap="round" fill="none"/>
        <path d="M7 24 C 12 19 18 15 26 11" stroke="#25D366" stroke-width="0.6" stroke-linecap="round" fill="none" stroke-dasharray="2 2"/>
        <rect x="6" y="16" width="16" height="4" rx="1.2" fill="#25D366"/>
        <path d="M10 16l2-5h6l2 5" fill="#25D366"/>
        <path d="M12.5 11.5l-1.5 4h4z" fill="#1F2937" opacity="0.5"/>
        <rect x="16" y="11.5" width="4" height="3.8" fill="#1F2937" opacity="0.5"/>
        <circle cx="21" cy="17.5" r="0.7" fill="#FBBF24"/>
        <circle cx="10" cy="20.5" r="2.2" fill="#111827"/><circle cx="10" cy="20.5" r="1.2" fill="#374151"/>
        <circle cx="18" cy="20.5" r="2.2" fill="#111827"/><circle cx="18" cy="20.5" r="1.2" fill="#374151"/>
        <circle cx="26" cy="10" r="2" fill="#25D366" opacity="0.3"/><circle cx="26" cy="10" r="1.2" fill="#25D366"/>
      </svg>
    </div>
    <p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:#9CA3AF;font-weight:500;">
      Chargement en cours...
    </p>
    <div class="loading-bar-track">
      <div class="loading-bar-fill"></div>
    </div>
  </div>

  <!-- React root -->
  <div id="root"></div>

  <!-- React 18 + Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- App Bundle -->
  <script type="text/babel" data-presets="react" src="bundle.js?v=9"></script>

  <!-- Hide loading screen after React mounts -->
  <script>
    // React signale via window.dispatchEvent(new Event('ce-ready')) dans main.js
    // une fois le useEffect du Root component fire. Plus propre qu'un poll.
    function hideLoader() {
      var loader = document.getElementById('ce-loading');
      if (!loader) return;
      loader.classList.add('fade-out');
      setTimeout(function() { loader.remove(); }, 400);
    }
    window.addEventListener('ce-ready', hideLoader, { once: true });

    // Filet de securite 8s : si l'event ne fire pas (erreur CDN, JS, ...)
    setTimeout(function() {
      var loader = document.getElementById('ce-loading');
      if (loader && !loader.classList.contains('fade-out')) {
        console.warn('[carexpress] event ce-ready jamais recu apres 8s — fade par securite');
        hideLoader();
      }
    }, 8000);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function() {});
    }
  </script>
</body>
</html>
